<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts CAP/DEPROT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F1EC;
  --surface: #FFFFFF;
  --surface2: #EDEAE2;
  --border: #DAD5CA;
  --text: #1C1A17;
  --muted: #7D766C;
  --accent: #1E4F7A;
  --accent-lt: #EBF2FA;
  --green: #1F6348;
  --red: #8B2020;
  --red-lt: #FAEAEA;
  --tag-bg: #E6E1D8;
  --tag-fg: #5C564E;
  --sh: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
  --sh2: 0 2px 8px rgba(0,0,0,.08), 0 10px 30px rgba(0,0,0,.07);
  --r: 10px;
  --dur: .17s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

.layout { display: grid; grid-template-columns: 268px 1fr; min-height: 100vh; }

aside {
  background: var(--text);
  color: #E8E3D8;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
aside::-webkit-scrollbar { width: 3px; }
aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.sb-head { padding: 26px 22px 18px; border-bottom: 1px solid rgba(255,255,255,.07); }
.sb-head h1 { font-family: 'DM Serif Display', serif; font-size: 20px; color: #F4F1EC; line-height: 1.25; margin-bottom: 3px; }
.sb-head p { font-size: 10px; color: rgba(232,227,216,.36); letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }

.sb-search { padding: 13px 22px 8px; }
.sb-search input {
  width: 100%; background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.09); border-radius: 7px;
  padding: 7px 11px; color: #E8E3D8;
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  transition: border-color var(--dur), background var(--dur);
}
.sb-search input::placeholder { color: rgba(232,227,216,.3); }
.sb-search input:focus { border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.11); }

.cat-lbl { padding: 13px 22px 4px; font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: rgba(232,227,216,.26); font-weight: 600; }
nav ul { list-style: none; padding: 0 10px; }
nav ul li a {
  display: block; padding: 7px 12px; border-radius: 6px;
  color: rgba(232,227,216,.62); font-size: 13px; cursor: pointer;
  transition: background var(--dur), color var(--dur); line-height: 1.35;
}
nav ul li a:hover { background: rgba(255,255,255,.06); color: #F4F1EC; }
nav ul li a.active { background: rgba(255,255,255,.12); color: #F4F1EC; font-weight: 500; }
.nav-count { opacity: .33; font-size: 11px; }

.sb-foot {
  margin-top: auto; padding: 14px 22px;
  border-top: 1px solid rgba(255,255,255,.06);
  font-size: 11px; color: rgba(232,227,216,.2);
}

main { padding: 34px 42px; max-width: 840px; }

.top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; flex-wrap: wrap; }
.top-bar h2 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; flex: 1; }
.badge { font-size: 11px; background: var(--tag-bg); color: var(--tag-fg); padding: 3px 10px; border-radius: 20px; font-weight: 500; }

.btn-add, .btn-export {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--dur);
}
.btn-add {
  border: 1.5px dashed var(--border);
  background: transparent; color: var(--muted);
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
.btn-export {
  border: 1px solid var(--border);
  background: var(--surface); color: var(--muted);
}
.btn-export:hover { border-color: var(--accent); color: var(--accent); }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 12px;
  box-shadow: var(--sh); transition: box-shadow var(--dur);
}
.card:hover { box-shadow: var(--sh2); }

.card-hd {
  display: flex; align-items: center; padding: 14px 17px;
  cursor: pointer; gap: 10px; border-radius: var(--r);
  transition: background var(--dur);
}
.card-hd:hover { background: #FAFAF8; }
.card.open .card-hd { border-radius: var(--r) var(--r) 0 0; }

.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 13.5px; font-weight: 600; line-height: 1.3; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.greeting-icon {
  font-size: 11px;
  background: var(--accent-lt);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.card-tag { display: inline-block; font-size: 9.5px; background: var(--tag-bg); color: var(--tag-fg); padding: 2px 8px; border-radius: 4px; margin-top: 4px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }

.card-btns { display: flex; gap: 5px; flex-shrink: 0; }

.btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: background var(--dur), color var(--dur); white-space: nowrap; }
.btn-copy { background: var(--accent); color: #fff; }
.btn-copy:hover { background: #183F62; }
.btn-copy.ok { background: var(--green); }
.btn-ghost { background: var(--surface2); color: var(--muted); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-del { background: var(--red-lt); color: var(--red); padding: 5px 8px; }
.btn-del:hover { background: #f5d0d0; }

.chev { width: 15px; height: 15px; color: var(--muted); transition: transform .18s ease; flex-shrink: 0; }
.card.open .chev { transform: rotate(180deg); }

.card-body { display: none; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

.preview {
  padding: 18px 22px; background: #FDFCFB;
  font-size: 13.5px; line-height: 1.6;
  color: var(--text);
  border-radius: 0 0 var(--r) var(--r);
}
.preview.editing-mode { display: none; }
.preview p { margin-bottom: 0.8em; }
.preview p:last-child { margin-bottom: 0; }
.preview a { color: var(--accent); text-decoration: none; }
.preview a:hover { text-decoration: underline; }
.preview ul { padding-left: 1.5em; margin-bottom: 0.8em; }
.preview li { margin-bottom: 0.2em; }
.preview br { display: block; margin: 0; }

.editor-wrap { display: none; flex-direction: column; }
.editor-wrap.visible { display: flex; }

.fmt-bar {
  display: flex; align-items: center; gap: 3px;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-wrap: wrap;
}
.fmt-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 5px; border: none;
  background: transparent; color: var(--muted); cursor: pointer;
  font-size: 13px; font-family: inherit; font-weight: 600;
  transition: background var(--dur), color var(--dur);
}
.fmt-btn:hover { background: var(--border); color: var(--text); }
.fmt-btn.active { background: var(--accent); color: #fff; }
.fmt-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

.link-row { display: flex; gap: 6px; align-items: center; padding: 6px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.link-row input { flex: 1; border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); background: var(--bg); outline: none; }
.link-row input:focus { border-color: var(--accent); }
.link-row.hidden { display: none; }

[contenteditable] {
  padding: 18px 22px; min-height: 180px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; line-height: 1.6;
  color: var(--text); background: #FDFCFB; outline: none;
}
[contenteditable] p { margin-bottom: 0.8em; }
[contenteditable] p:last-child { margin-bottom: 0; }
[contenteditable] a { color: var(--accent); }
[contenteditable] ul { padding-left: 1.5em; margin-bottom: 0.8em; }
[contenteditable] li { margin-bottom: 0.2em; }
[contenteditable]:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }

.edit-bar {
  display: flex; gap: 6px; align-items: center;
  padding: 9px 13px; background: var(--surface2);
  border-top: 1px solid var(--border); border-radius: 0 0 var(--r) var(--r); flex-wrap: wrap;
}
.title-field {
  border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  background: var(--bg); color: var(--text); outline: none; width: 220px; margin-left: auto;
}
.title-field:focus { border-color: var(--accent); }
.btn-save { background: var(--green); color: #fff; }
.btn-save:hover { background: #174F37; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.38);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 13px;
  padding: 26px 28px; width: 540px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  transform: translateY(10px); transition: transform .2s;
}
.overlay.show .modal { transform: translateY(0); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 19px; margin-bottom: 16px; font-weight: 400; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; letter-spacing: .05em; text-transform: uppercase; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 11px; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
  color: var(--text); background: var(--bg); outline: none;
  transition: border-color var(--dur), background var(--dur);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
.field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
.checkbox-field { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.checkbox-field input { width: auto; margin: 0; }
.checkbox-field label { margin: 0; cursor: pointer; text-transform: none; font-weight: normal; color: var(--text); }
.modal-btns { display: flex; gap: 7px; justify-content: flex-end; margin-top: 16px; }
.btn-primary { background: var(--accent); color: #fff; padding: 8px 17px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background var(--dur); }
.btn-primary:hover { background: #183F62; }
.btn-sec { background: var(--surface2); color: var(--muted); padding: 8px 15px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: background var(--dur); }
.btn-sec:hover { background: var(--border); }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: #F4F1EC;
  padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 18px rgba(0,0,0,.2);
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty p { font-size: 14px; margin-top: 10px; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  aside { position: static; height: auto; }
  main { padding: 24px 20px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside>
    <div class="sb-head">
      <h1>Scripts<br>CAP/DEPROT</h1>
      <p>Gerenciador de modelos</p>
    </div>
    <div class="sb-search">
      <input type="text" id="searchInput" placeholder="Buscar script…" oninput="onSearch(this.value)">
    </div>
    <div id="sidebarNav"></div>
    <div class="sb-foot">Anderson Andrade &middot; SMUL</div>
  </aside>

  <main>
    <div class="top-bar">
      <h2 id="pageTitle">Todos os scripts</h2>
      <span class="badge" id="badge"></span>
      <button class="btn-export" onclick="exportJSON()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar JSON
      </button>
      <button class="btn-add" onclick="openModal()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo script
      </button>
    </div>
    <div id="cards"><div class="loading" style="text-align:center;padding:60px">Carregando scripts…</div></div>
    <div class="empty" id="empty" style="display:none">
      <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Nenhum script encontrado.</p>
    </div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Novo script</h3>
    <div class="field">
      <label>Título</label>
      <input type="text" id="newTitle" placeholder="Ex: Solicitando documentos adicionais">
    </div>
    <div class="field">
      <label>Categoria existente</label>
      <select id="newCat"></select>
    </div>
    <div class="field">
      <label>Nova categoria (opcional)</label>
      <input type="text" id="newCatCustom" placeholder="Deixe em branco para usar a categoria acima">
    </div>
    <div class="checkbox-field">
      <input type="checkbox" id="newGreeting">
      <label for="newGreeting">🕐 Incluir saudação automática ("Bom dia / Boa tarde / Boa noite")</label>
    </div>
    <div class="field">
      <label>Texto do script (você pode usar a tag &lt;saudacao&gt; onde quiser)</label>
      <textarea id="newText" placeholder="Cole ou escreva o texto aqui…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="addScript()">Adicionar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== ESTADO GLOBAL ====================
let scripts = [];
let nextId = 100;
let activeCat = 'all';
let searchQ = '';

// ==================== SAUDAÇÃO AUTOMÁTICA ====================
function saudacao() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'Bom dia';
  if (h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// Aplica a saudação no HTML para EXIBIÇÃO (substitui a tag)
function applyGreetingForDisplay(html) {
  return html.replace(/<saudacao>/g, saudacao());
}

// Verifica se o HTML contém a tag de saudação (para o selo)
function hasGreetingTag(html) {
  return html.includes('<saudacao>');
}

// Remove formatação excessiva para cópia limpa
function cleanHtmlForCopy(html) {
  // Primeiro aplica a saudação
  let processed = applyGreetingForDisplay(html);
  
  // Remove quebras de linha desnecessárias entre tags
  processed = processed.replace(/>\s+</g, '><');
  
  // Garante espaçamento normal entre palavras
  processed = processed.replace(/\s+/g, ' ');
  
  // Re-adiciona espaçamento mínimo entre tags e texto
  processed = processed.replace(/>([^<]+)</g, (match, text) => {
    return '>' + text.trim() + '<';
  });
  
  return processed;
}

// ==================== INSERIR SAUDAÇÃO NO EDITOR ====================
function insertGreeting(editorId) {
  const editor = document.getElementById(editorId);
  if (!editor) return;
  
  editor.focus();
  
  // Insere a tag <saudacao> no cursor
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    const textNode = document.createTextNode('<saudacao>');
    range.deleteContents();
    range.insertNode(textNode);
    
    // Move cursor para depois da tag
    range.setStartAfter(textNode);
    range.setEndAfter(textNode);
    selection.removeAllRanges();
    selection.addRange(range);
  } else {
    // Se não houver seleção, insere no final
    editor.appendChild(document.createTextNode('<saudacao>'));
  }
  
  toast('Tag <saudacao> inserida!');
}

// ==================== CARREGAR DADOS ====================
async function loadData() {
  try {
    const local = localStorage.getItem('scripts_capdeprot');
    if (local) {
      scripts = JSON.parse(local);
      nextId = Math.max(...scripts.map(s => s.id), 0) + 1;
      buildSidebar();
      render();
      toast('Dados carregados do cache local');
      return;
    }
    
    const response = await fetch('scripts.json');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    
    const text = await response.text();
    scripts = JSON.parse(text);
    nextId = Math.max(...scripts.map(s => s.id), 0) + 1;
    buildSidebar();
    render();
    toast('Scripts carregados com sucesso');
  } catch (err) {
    console.error('Erro ao carregar:', err);
    document.getElementById('cards').innerHTML = 
      '<div class="empty"><p>❌ Erro ao carregar scripts.json<br>' +
      'Verifique se o arquivo existe e é um JSON válido.</p></div>';
  }
}

function saveToLocal() {
  localStorage.setItem('scripts_capdeprot', JSON.stringify(scripts));
  toast('Alterações salvas localmente');
}

function getCategories() {
  const cats = ['all'];
  scripts.forEach(s => { if (!cats.includes(s.cat)) cats.push(s.cat); });
  return cats;
}

function getFilteredScripts() {
  let filtered = activeCat === 'all' ? scripts : scripts.filter(s => s.cat === activeCat);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    filtered = filtered.filter(s => 
      s.title.toLowerCase().includes(q) || 
      s.cat.toLowerCase().includes(q) ||
      s.html.toLowerCase().includes(q)
    );
  }
  return filtered;
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const cats = getCategories();
  const counts = {};
  scripts.forEach(s => { counts[s.cat] = (counts[s.cat] || 0) + 1; });
  
  let html = '<div class="cat-lbl">Visão geral</div><ul>' +
    '<li><a onclick="setCat(\'all\')" class="' + (activeCat === 'all' ? 'active' : '') + '">' +
    'Todos os scripts <span class="nav-count">(' + scripts.length + ')</span></a></li></ul>';
  
  cats.forEach(cat => {
    if (cat === 'all') return;
    html += '<div class="cat-lbl">' + escapeHtml(cat) + '</div><ul><li>' +
      '<a onclick="setCat(\'' + cat.replace(/'/g, "\\'") + '\')" class="' + (activeCat === cat ? 'active' : '') + '">' +
      escapeHtml(cat) + ' <span class="nav-count">(' + (counts[cat] || 0) + ')</span></a></li></ul>';
  });
  
  nav.innerHTML = html;
}

function setCat(cat) {
  activeCat = cat;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('pageTitle').innerHTML = cat === 'all' ? 'Todos os scripts' : cat;
  buildSidebar();
  render();
}

function onSearch(val) {
  searchQ = val;
  render();
}

function render() {
  const list = getFilteredScripts();
  const badge = document.getElementById('badge');
  const empty = document.getElementById('empty');
  const container = document.getElementById('cards');
  
  badge.textContent = list.length + (list.length === 1 ? ' script' : ' scripts');
  
  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  container.innerHTML = list.map(s => cardHTML(s)).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function cardHTML(s) {
  const displayHTML = applyGreetingForDisplay(s.html);
  const hasGreeting = hasGreetingTag(s.html);
  
  return '<div class="card" id="c' + s.id + '">' +
    '<div class="card-hd" onclick="toggleCard(' + s.id + ')">' +
      '<div class="card-info">' +
        '<div class="card-title">' + 
          escapeHtml(s.title) + 
          (hasGreeting ? '<span class="greeting-icon">🕐 Saudação automática</span>' : '') +
        '</div>' +
        '<span class="card-tag">' + escapeHtml(s.cat) + '</span>' +
      '</div>' +
      '<div class="card-btns" onclick="event.stopPropagation()">' +
        '<button class="btn btn-copy" id="cb' + s.id + '" onclick="copyScript(' + s.id + ')">' +
          '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
          'Copiar</button>' +
        '<button class="btn btn-ghost" onclick="startEdit(' + s.id + ')">' +
          '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>' +
          'Editar</button>' +
        '<button class="btn btn-del" onclick="deleteScript(' + s.id + ')">' +
          '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
          '</button>' +
      '</div>' +
      '<svg class="chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="preview" id="pv' + s.id + '">' + displayHTML + '</div>' +
      '<div class="editor-wrap" id="ew' + s.id + '">' +
        '<div class="fmt-bar">' +
          '<button class="fmt-btn" title="Negrito" onmousedown="event.preventDefault();document.execCommand(\'bold\')"><strong>B</strong></button>' +
          '<button class="fmt-btn" title="Itálico" onmousedown="event.preventDefault();document.execCommand(\'italic\')"><em>I</em></button>' +
          '<button class="fmt-btn" title="Sublinhado" onmousedown="event.preventDefault();document.execCommand(\'underline\')"><u>U</u></button>' +
          '<div class="fmt-sep"></div>' +
          '<button class="fmt-btn" title="Inserir tag de saudação (&lt;saudacao&gt;)" onmousedown="event.preventDefault();insertGreeting(\'ce' + s.id + '\')">🕐</button>' +
          '<div class="fmt-sep"></div>' +
          '<button class="fmt-btn" title="Lista" onmousedown="event.preventDefault();document.execCommand(\'insertUnorderedList\')">' +
            '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>' +
          '</button>' +
        '</div>' +
        '<div contenteditable="true" id="ce' + s.id + '" data-placeholder="Texto do script… (use &lt;saudacao&gt; para saudação automática)"></div>' +
        '<div class="edit-bar">' +
          '<button class="btn btn-save" onclick="saveEdit(' + s.id + ')">✓ Salvar</button>' +
          '<button class="btn btn-ghost" onclick="cancelEdit(' + s.id + ')">Cancelar</button>' +
          '<input class="title-field" id="tt' + s.id + '" placeholder="Título do script" value="' + escapeHtml(s.title) + '">' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleCard(id) {
  document.getElementById('c' + id).classList.toggle('open');
}

function startEdit(id) {
  const s = scripts.find(x => x.id === id);
  const card = document.getElementById('c' + id);
  card.classList.add('open');
  document.getElementById('pv' + id).classList.add('editing-mode');
  document.getElementById('ew' + id).classList.add('visible');
  const ce = document.getElementById('ce' + id);
  // Mostra o HTML BRUTO (com a tag <saudacao>) para edição
  ce.innerHTML = s.html;
  ce.focus();
}

function cancelEdit(id) {
  document.getElementById('pv' + id).classList.remove('editing-mode');
  document.getElementById('ew' + id).classList.remove('visible');
}

function saveEdit(id) {
  const idx = scripts.findIndex(x => x.id === id);
  const ce = document.getElementById('ce' + id);
  let newHTML = ce.innerHTML;
  const newTitle = document.getElementById('tt' + id).value.trim();
  
  // Limpa formatação excessiva do contenteditable
  newHTML = cleanEditorHtml(newHTML);
  
  scripts[idx].html = newHTML;
  if (newTitle) scripts[idx].title = newTitle;
  
  // Atualiza a prévia (com saudação aplicada)
  document.getElementById('pv' + id).innerHTML = applyGreetingForDisplay(newHTML);
  
  // Atualiza o título e o selo de saudação
  const titleSpan = document.getElementById('c' + id).querySelector('.card-title');
  titleSpan.innerHTML = escapeHtml(scripts[idx].title) + 
    (hasGreetingTag(newHTML) ? '<span class="greeting-icon">🕐 Saudação automática</span>' : '');
  
  cancelEdit(id);
  saveToLocal();
  buildSidebar();
  render();
  toast('Script salvo!');
}

// Função para limpar HTML vindo do contenteditable
function cleanEditorHtml(html) {
  // Remove spans e estilos desnecessários
  let cleaned = html.replace(/<span style="[^"]*">/g, '');
  cleaned = cleaned.replace(/<\/span>/g, '');
  
  // Remove tags vazias
  cleaned = cleaned.replace(/<p><\/p>/g, '');
  cleaned = cleaned.replace(/<br>$/g, '');
  
  // Garante que <saudacao> não seja envolvido por tags extras
  cleaned = cleaned.replace(/<p><saudacao><\/p>/g, '<saudacao>');
  cleaned = cleaned.replace(/<saudacao>/g, '<saudacao>');
  
  return cleaned;
}

function deleteScript(id) {
  if (!confirm('Excluir este script permanentemente?')) return;
  scripts = scripts.filter(x => x.id !== id);
  saveToLocal();
  buildSidebar();
  render();
  toast('Script excluído');
}

async function copyScript(id) {
  const s = scripts.find(x => x.id === id);
  if (!s) return;
  
  // Gera o HTML limpo para cópia (com saudação aplicada)
  const cleanHTML = cleanHtmlForCopy(s.html);
  
  // Extrai texto puro para fallback
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = cleanHTML;
  const plainText = tempDiv.textContent || tempDiv.innerText;
  
  try {
    // Tenta copiar como HTML formatado
    const blob = new Blob([cleanHTML], { type: 'text/html' });
    const blobPlain = new Blob([plainText], { type: 'text/plain' });
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': blob,
        'text/plain': blobPlain
      })
    ]);
    
    const btn = document.getElementById('cb' + s.id);
    btn.classList.add('ok');
    btn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
    setTimeout(() => {
      btn.classList.remove('ok');
      btn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar';
    }, 2000);
    toast('Texto copiado com formatação limpa!');
  } catch(err) {
    // Fallback: copia só texto puro
    navigator.clipboard.writeText(plainText);
    toast('Copiado (somente texto)');
  }
}

function openModal() {
  const sel = document.getElementById('newCat');
  sel.innerHTML = '';
  getCategories().forEach(c => {
    if (c !== 'all') sel.innerHTML += '<option>' + escapeHtml(c) + '</option>';
  });
  document.getElementById('newTitle').value = '';
  document.getElementById('newCatCustom').value = '';
  document.getElementById('newText').value = '';
  document.getElementById('newGreeting').checked = false;
  document.getElementById('overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

function textToHTML(txt, includeGreeting) {
  // Converte texto puro em HTML com parágrafos
  let html = txt.split(/\n\n+/).map(block => {
    const lines = block.split('\n').map(l => escapeHtml(l)).join('<br>');
    return '<p>' + lines + '</p>';
  }).join('');
  
  if (includeGreeting && !html.includes('<saudacao>')) {
    html = '<p><saudacao></p>' + html;
  }
  
  return html;
}

function addScript() {
  const title = document.getElementById('newTitle').value.trim();
  const text = document.getElementById('newText').value.trim();
  const cat = document.getElementById('newCatCustom').value.trim() || 
              document.getElementById('newCat').value || 'Geral';
  const includeGreeting = document.getElementById('newGreeting').checked;
  
  if (!title || !text) {
    alert('Preencha o título e o texto do script.');
    return;
  }
  
  scripts.push({ 
    id: nextId++, 
    cat: cat, 
    title: title, 
    html: textToHTML(text, includeGreeting) 
  });
  
  closeModal();
  activeCat = cat;
  searchQ = '';
  document.getElementById('pageTitle').innerHTML = cat;
  saveToLocal();
  buildSidebar();
  render();
  toast('Script adicionado!');
}

function exportJSON() {
  const json = JSON.stringify(scripts, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scripts.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('scripts.json exportado!');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

loadData();
</script>
