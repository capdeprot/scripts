<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts CAP/DEPROT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F1EC;
  --surface: #FFFFFF;
  --surface2: #EDEAE2;
  --border: #DAD5CA;
  --text: #1C1A17;
  --muted: #7D766C;
  --accent: #1E4F7A;
  --accent-lt: #EBF2FA;
  --green: #1F6348;
  --red: #8B2020;
  --red-lt: #FAEAEA;
  --tag-bg: #E6E1D8;
  --tag-fg: #5C564E;
  --sh: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
  --sh2: 0 2px 8px rgba(0,0,0,.08), 0 10px 30px rgba(0,0,0,.07);
  --r: 10px;
  --dur: .17s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 268px 1fr; min-height: 100vh; }

/* ── SIDEBAR ── */
aside {
  background: var(--text);
  color: #E8E3D8;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
aside::-webkit-scrollbar { width: 3px; }
aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.sb-head { padding: 26px 22px 18px; border-bottom: 1px solid rgba(255,255,255,.07); }
.sb-head h1 { font-family: 'DM Serif Display', serif; font-size: 20px; color: #F4F1EC; line-height: 1.25; margin-bottom: 3px; }
.sb-head p { font-size: 10px; color: rgba(232,227,216,.36); letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }

.sb-search { padding: 13px 22px 8px; }
.sb-search input {
  width: 100%; background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.09); border-radius: 7px;
  padding: 7px 11px; color: #E8E3D8;
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  transition: border-color var(--dur), background var(--dur);
}
.sb-search input::placeholder { color: rgba(232,227,216,.3); }
.sb-search input:focus { border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.11); }

.cat-lbl { padding: 13px 22px 4px; font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: rgba(232,227,216,.26); font-weight: 600; }
nav ul { list-style: none; padding: 0 10px; }
nav ul li a {
  display: block; padding: 7px 12px; border-radius: 6px;
  color: rgba(232,227,216,.62); font-size: 13px; cursor: pointer;
  transition: background var(--dur), color var(--dur); line-height: 1.35;
}
nav ul li a:hover { background: rgba(255,255,255,.06); color: #F4F1EC; }
nav ul li a.active { background: rgba(255,255,255,.12); color: #F4F1EC; font-weight: 500; }
.nav-count { opacity: .33; font-size: 11px; }

.sb-foot {
  margin-top: auto; padding: 14px 22px;
  border-top: 1px solid rgba(255,255,255,.06);
  font-size: 11px; color: rgba(232,227,216,.2);
}

/* ── MAIN ── */
main { padding: 34px 42px; max-width: 840px; }

.top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; flex-wrap: wrap; }
.top-bar h2 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; flex: 1; }
.badge { font-size: 11px; background: var(--tag-bg); color: var(--tag-fg); padding: 3px 10px; border-radius: 20px; font-weight: 500; }

.btn-add {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1.5px dashed var(--border);
  background: transparent; color: var(--muted);
  transition: border-color var(--dur), color var(--dur), background var(--dur);
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

.btn-export {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted);
  transition: border-color var(--dur), color var(--dur), background var(--dur);
}
.btn-export:hover { border-color: var(--accent); color: var(--accent); }

/* ── CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 12px;
  box-shadow: var(--sh); transition: box-shadow var(--dur);
}
.card:hover { box-shadow: var(--sh2); }

.card-hd {
  display: flex; align-items: center; padding: 14px 17px;
  cursor: pointer; gap: 10px; border-radius: var(--r);
  transition: background var(--dur);
}
.card-hd:hover { background: #FAFAF8; }
.card.open .card-hd { border-radius: var(--r) var(--r) 0 0; }

.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 13.5px; font-weight: 600; line-height: 1.3; }
.card-tag { display: inline-block; font-size: 9.5px; background: var(--tag-bg); color: var(--tag-fg); padding: 2px 8px; border-radius: 4px; margin-top: 4px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }

.card-btns { display: flex; gap: 5px; flex-shrink: 0; }

/* buttons */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: background var(--dur), color var(--dur); white-space: nowrap; }
.btn-copy { background: var(--accent); color: #fff; }
.btn-copy:hover { background: #183F62; }
.btn-copy.ok { background: var(--green); }
.btn-ghost { background: var(--surface2); color: var(--muted); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-del { background: var(--red-lt); color: var(--red); padding: 5px 8px; }
.btn-del:hover { background: #f5d0d0; }

.chev { width: 15px; height: 15px; color: var(--muted); transition: transform .18s ease; flex-shrink: 0; }
.card.open .chev { transform: rotate(180deg); }

/* ── CARD BODY ── */
.card-body { display: none; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

/* rich text preview */
.preview {
  padding: 18px 22px; background: #FDFCFB;
  font-size: 13.5px; line-height: 1.85; color: var(--text);
  border-radius: 0 0 var(--r) var(--r);
}
.preview.editing-mode { display: none; }
.preview p { margin-bottom: .75em; }
.preview p:last-child { margin-bottom: 0; }
.preview a { color: var(--accent); }
.preview ul { padding-left: 1.4em; margin-bottom: .75em; }
.preview li { margin-bottom: .3em; }

/* rich text editor */
.editor-wrap { display: none; flex-direction: column; }
.editor-wrap.visible { display: flex; }

/* formatting toolbar */
.fmt-bar {
  display: flex; align-items: center; gap: 3px;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-wrap: wrap;
}
.fmt-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 5px; border: none;
  background: transparent; color: var(--muted); cursor: pointer;
  font-size: 13px; font-family: inherit; font-weight: 600;
  transition: background var(--dur), color var(--dur);
}
.fmt-btn:hover { background: var(--border); color: var(--text); }
.fmt-btn.active { background: var(--accent); color: #fff; }
.fmt-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

.link-row { display: flex; gap: 6px; align-items: center; padding: 6px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.link-row input { flex: 1; border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); background: var(--bg); outline: none; }
.link-row input:focus { border-color: var(--accent); }
.link-row.hidden { display: none; }

[contenteditable] {
  padding: 18px 22px; min-height: 160px;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; line-height: 1.85;
  color: var(--text); background: #FDFCFB; outline: none;
}
[contenteditable] p { margin-bottom: .75em; }
[contenteditable] p:last-child { margin-bottom: 0; }
[contenteditable] a { color: var(--accent); }
[contenteditable] ul { padding-left: 1.4em; margin-bottom: .75em; }
[contenteditable] li { margin-bottom: .3em; }
[contenteditable]:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }

.edit-bar {
  display: flex; gap: 6px; align-items: center;
  padding: 9px 13px; background: var(--surface2);
  border-top: 1px solid var(--border); border-radius: 0 0 var(--r) var(--r); flex-wrap: wrap;
}
.title-field {
  border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  background: var(--bg); color: var(--text); outline: none; width: 220px; margin-left: auto;
}
.title-field:focus { border-color: var(--accent); }
.btn-save { background: var(--green); color: #fff; }
.btn-save:hover { background: #174F37; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.38);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 13px;
  padding: 26px 28px; width: 540px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  transform: translateY(10px); transition: transform .2s;
}
.overlay.show .modal { transform: translateY(0); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 19px; margin-bottom: 16px; font-weight: 400; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; letter-spacing: .05em; text-transform: uppercase; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 11px; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
  color: var(--text); background: var(--bg); outline: none;
  transition: border-color var(--dur), background var(--dur);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
.field textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
.modal-btns { display: flex; gap: 7px; justify-content: flex-end; margin-top: 16px; }
.btn-primary { background: var(--accent); color: #fff; padding: 8px 17px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background var(--dur); }
.btn-primary:hover { background: #183F62; }
.btn-sec { background: var(--surface2); color: var(--muted); padding: 8px 15px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: background var(--dur); }
.btn-sec:hover { background: var(--border); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: #F4F1EC;
  padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 18px rgba(0,0,0,.2);
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty p { font-size: 14px; margin-top: 10px; }

/* ── LOADING ── */
.loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="layout">
  <aside>
    <div class="sb-head">
      <h1>Scripts<br>CAP/DEPROT</h1>
      <p>Gerenciador de modelos</p>
    </div>
    <div class="sb-search">
      <input type="text" id="searchInput" placeholder="Buscar script…" oninput="onSearch(this.value)">
    </div>
    <div id="sidebarNav"></div>
    <div class="sb-foot">Anderson Andrade &middot; SMUL</div>
  </aside>

  <main>
    <div class="top-bar">
      <h2 id="pageTitle">Todos os scripts</h2>
      <span class="badge" id="badge"></span>
      <button class="btn-export" onclick="exportJSON()" title="Exportar scripts.json atualizado">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar JSON
      </button>
      <button class="btn-add" onclick="openModal()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo script
      </button>
    </div>
    <div id="cards"><div class="loading">Carregando scripts…</div></div>
    <div class="empty" id="empty" style="display:none">
      <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Nenhum script encontrado.</p>
    </div>
  </main>
</div>

<!-- Add modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Novo script</h3>
    <div class="field">
      <label>Título</label>
      <input type="text" id="newTitle" placeholder="Ex: Solicitando documentos adicionais">
    </div>
    <div class="field">
      <label>Categoria existente</label>
      <select id="newCat"></select>
    </div>
    <div class="field">
      <label>Nova categoria (opcional)</label>
      <input type="text" id="newCatCustom" placeholder="Deixe em branco para usar a categoria acima">
    </div>
    <div class="field">
      <label>Texto do script (cole o texto simples — a formatação pode ser feita após adicionar)</label>
      <textarea id="newText" placeholder="Cole ou escreva o texto aqui…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="addScript()">Adicionar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
var scripts = [];
var nextId = 100;
var activeCat = 'all';
var searchQ = '';

// ── SAUDAÇÃO AUTOMÁTICA ────────────────────────────────────────────────────
function saudacao() {
  var h = new Date().getHours();
  if (h >= 5 && h < 12)  return 'Bom dia';
  if (h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// substitui <saudacao> no HTML do script pelo valor atual
function applyGreeting(html) {
  return html.replace(/<saudacao>/g, saudacao());
}

// ── LOAD ───────────────────────────────────────────────────────────────────
fetch('scripts.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    scripts = data;
    nextId = Math.max.apply(null, scripts.map(function(s){ return s.id; })) + 1;
    buildSidebar();
    render();
  })
  .catch(function() {
    document.getElementById('cards').innerHTML =
      '<div class="empty"><p>Não foi possível carregar <strong>scripts.json</strong>.<br>Certifique-se de que o arquivo está na mesma pasta que o index.html.</p></div>';
  });

// ── HELPERS ────────────────────────────────────────────────────────────────
function cats() {
  var r = ['all'];
  scripts.forEach(function(s) { if (r.indexOf(s.cat) < 0) r.push(s.cat); });
  return r;
}

function visible() {
  var list = activeCat === 'all' ? scripts : scripts.filter(function(s){ return s.cat === activeCat; });
  if (!searchQ) return list;
  var q = searchQ.toLowerCase();
  return list.filter(function(s) {
    var txt = s.html.replace(/<[^>]*>/g, ' ').toLowerCase();
    return s.title.toLowerCase().indexOf(q) >= 0 || txt.indexOf(q) >= 0 || s.cat.toLowerCase().indexOf(q) >= 0;
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar() {
  var c = cats(), html = '';
  var counts = {};
  scripts.forEach(function(s){ counts[s.cat] = (counts[s.cat]||0) + 1; });

  html += '<div class="cat-lbl">Visão geral</div><ul>'
    + '<li><a onclick="setCat(\'all\')" class="' + (activeCat==='all'?'active':'') + '">'
    + 'Todos os scripts <span class="nav-count">(' + scripts.length + ')</span></a></li></ul>';

  c.forEach(function(cat) {
    if (cat === 'all') return;
    html += '<div class="cat-lbl">' + esc(cat) + '</div><ul><li>'
      + '<a onclick="setCat(' + JSON.stringify(cat) + ')" class="' + (activeCat===cat?'active':'') + '">'
      + esc(cat) + ' <span class="nav-count">(' + counts[cat] + ')</span></a></li></ul>';
  });

  document.getElementById('sidebarNav').innerHTML = html;
}

function setCat(cat) {
  activeCat = cat; searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('pageTitle').textContent = cat === 'all' ? 'Todos os scripts' : cat;
  buildSidebar(); render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  var list = visible();
  document.getElementById('badge').textContent = list.length + (list.length === 1 ? ' script' : ' scripts');
  var em = document.getElementById('empty');
  var co = document.getElementById('cards');
  if (list.length === 0) { co.innerHTML = ''; em.style.display = 'block'; return; }
  em.style.display = 'none';
  co.innerHTML = list.map(cardHTML).join('');
}

function cardHTML(s) {
  var previewHTML = applyGreeting(s.html);
  return '<div class="card" id="c' + s.id + '">'
    + '<div class="card-hd" onclick="toggleCard(' + s.id + ')">'
      + '<div class="card-info">'
        + '<div class="card-title">' + esc(s.title) + '</div>'
        + '<span class="card-tag">' + esc(s.cat) + '</span>'
      + '</div>'
      + '<div class="card-btns" onclick="event.stopPropagation()">'
        + '<button class="btn btn-copy" id="cb' + s.id + '" onclick="copyScript(' + s.id + ')">'
          + iconCopy() + 'Copiar</button>'
        + '<button class="btn btn-ghost" onclick="startEdit(' + s.id + ')">'
          + iconEdit() + 'Editar</button>'
        + '<button class="btn btn-del" onclick="deleteScript(' + s.id + ')" title="Excluir">'
          + iconTrash() + '</button>'
      + '</div>'
      + '<svg class="chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>'
    + '</div>'
    + '<div class="card-body">'
      + '<div class="preview" id="pv' + s.id + '">' + previewHTML + '</div>'
      + '<div class="editor-wrap" id="ew' + s.id + '">'
        + '<div class="fmt-bar" id="fb' + s.id + '">'
          + '<button class="fmt-btn" title="Negrito" onmousedown="event.preventDefault();fmt(\'bold\')">'
            + '<strong>B</strong></button>'
          + '<button class="fmt-btn" title="Itálico" onmousedown="event.preventDefault();fmt(\'italic\')">'
            + '<em>I</em></button>'
          + '<button class="fmt-btn" title="Sublinhado" onmousedown="event.preventDefault();fmt(\'underline\')">'
            + '<u>U</u></button>'
          + '<div class="fmt-sep"></div>'
          + '<button class="fmt-btn" title="Inserir link" onmousedown="event.preventDefault();toggleLinkRow(' + s.id + ')">'
            + iconLink() + '</button>'
          + '<button class="fmt-btn" title="Remover link" onmousedown="event.preventDefault();fmt(\'unlink\')">'
            + iconUnlink() + '</button>'
          + '<div class="fmt-sep"></div>'
          + '<button class="fmt-btn" title="Lista" onmousedown="event.preventDefault();fmt(\'insertUnorderedList\')">'
            + iconList() + '</button>'
        + '</div>'
        + '<div class="link-row hidden" id="lr' + s.id + '">'
          + '<input type="url" id="li' + s.id + '" placeholder="https://…">'
          + '<button class="btn btn-ghost" style="font-size:12px" onmousedown="event.preventDefault();applyLink(' + s.id + ')">Inserir</button>'
          + '<button class="btn btn-ghost" style="font-size:12px" onmousedown="event.preventDefault();toggleLinkRow(' + s.id + ')">×</button>'
        + '</div>'
        + '<div contenteditable="true" id="ce' + s.id + '" data-placeholder="Texto do script…" '
          + 'onkeydown="handleEditorKey(event,' + s.id + ')">'
        + '</div>'
        + '<div class="edit-bar">'
          + '<button class="btn btn-save" onclick="saveEdit(' + s.id + ')">'
            + iconCheck() + 'Salvar</button>'
          + '<button class="btn btn-ghost" onclick="cancelEdit(' + s.id + ')">Cancelar</button>'
          + '<input class="title-field" id="tt' + s.id + '" placeholder="Título do script">'
        + '</div>'
      + '</div>'
    + '</div>'
  + '</div>';
}

// ── ICONS ──────────────────────────────────────────────────────────────────

// ── CARD ACTIONS ───────────────────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById('c' + id).classList.toggle('open');
}

// Extract plain text + hyperlinks for clipboard (paste-friendly in email clients)
function copyScript(id) {
  var s = scripts.find(function(x){ return x.id === id; });
  if (!s) return;

  var processedHTML = applyGreeting(s.html);

  // Build a temporary element to extract rich content
  var tmp = document.createElement('div');
  tmp.innerHTML = processedHTML;

  // Copy as both HTML and plain text so email clients receive rich formatting
  var htmlContent = tmp.innerHTML;
  var plainText = tmp.innerText || tmp.textContent;

  var blob = new Blob([htmlContent], { type: 'text/html' });
  var blobPlain = new Blob([plainText], { type: 'text/plain' });

  var item = new ClipboardItem({ 'text/html': blob, 'text/plain': blobPlain });
  navigator.clipboard.write([item]).then(function() {
    var btn = document.getElementById('cb' + id);
    btn.classList.add('ok');
    btn.innerHTML = iconCheck() + 'Copiado!';
    toast('Texto copiado com formatação (' + saudacao() + ')');
    setTimeout(function() {
      btn.classList.remove('ok');
      btn.innerHTML = iconCopy() + 'Copiar';
    }, 2000);
  }).catch(function() {
    // Fallback: plain text only
    navigator.clipboard.writeText(plainText).then(function() {
      toast('Copiado (somente texto)');
    });
  });
}

// ── RICH TEXT EDITOR ───────────────────────────────────────────────────────
var savedSelection = null;

function fmt(cmd) {
  document.execCommand(cmd, false, null);
}

function toggleLinkRow(id) {
  var lr = document.getElementById('lr' + id);
  lr.classList.toggle('hidden');
  if (!lr.classList.contains('hidden')) {
    savedSelection = saveSelection();
    document.getElementById('li' + id).focus();
  }
}

function applyLink(id) {
  var url = document.getElementById('li' + id).value.trim();
  if (!url) return;
  restoreSelection(savedSelection);
  document.execCommand('createLink', false, url);
  // Make link open in new tab
  var ce = document.getElementById('ce' + id);
  ce.querySelectorAll('a').forEach(function(a){ a.target='_blank'; a.rel='noopener noreferrer'; });
  document.getElementById('lr' + id).classList.add('hidden');
  document.getElementById('li' + id).value = '';
  ce.focus();
}

function saveSelection() {
  var sel = window.getSelection();
  if (sel.rangeCount > 0) return sel.getRangeAt(0).cloneRange();
  return null;
}

function restoreSelection(range) {
  if (!range) return;
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function handleEditorKey(e, id) {
  if (e.key === 'Escape') cancelEdit(id);
}

function startEdit(id) {
  var s = scripts.find(function(x){ return x.id === id; });
  var card = document.getElementById('c' + id);
  card.classList.add('open');
  document.getElementById('pv' + id).classList.add('editing-mode');
  var ew = document.getElementById('ew' + id);
  ew.classList.add('visible');
  // Populate contenteditable with raw html (with <saudacao> tag preserved for editing)
  var ce = document.getElementById('ce' + id);
  ce.innerHTML = s.html;
  document.getElementById('tt' + id).value = s.title;
  ce.focus();
}

function cancelEdit(id) {
  document.getElementById('pv' + id).classList.remove('editing-mode');
  document.getElementById('ew' + id).classList.remove('visible');
  // hide link row
  var lr = document.getElementById('lr' + id);
  if (lr) lr.classList.add('hidden');
}

function saveEdit(id) {
  var idx = scripts.findIndex(function(x){ return x.id === id; });
  var ce = document.getElementById('ce' + id);
  var newHTML = ce.innerHTML;
  var newTitle = document.getElementById('tt' + id).value.trim();

  scripts[idx].html = newHTML;
  if (newTitle) scripts[idx].title = newTitle;

  // Update preview with greeting applied
  document.getElementById('pv' + id).innerHTML = applyGreeting(newHTML);
  document.getElementById('c' + id).querySelector('.card-title').textContent = scripts[idx].title;

  cancelEdit(id);
  buildSidebar();
  toast('Script salvo');
}

function deleteScript(id) {
  if (!confirm('Excluir este script permanentemente?')) return;
  scripts = scripts.filter(function(x){ return x.id !== id; });
  buildSidebar(); render();
  toast('Script excluído');
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
function onSearch(v) { searchQ = v.trim(); render(); }

// ── ADD MODAL ──────────────────────────────────────────────────────────────
function openModal() {
  var sel = document.getElementById('newCat');
  sel.innerHTML = '';
  cats().forEach(function(c) {
    if (c === 'all') return;
    sel.innerHTML += '<option>' + esc(c) + '</option>';
  });
  ['newTitle','newCatCustom'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('newText').value = '';
  document.getElementById('overlay').classList.add('show');
  setTimeout(function(){ document.getElementById('newTitle').focus(); }, 60);
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }

document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

function textToHTML(txt) {
  // Convert plain text to simple paragraph-based HTML
  return txt.split(/\n\n+/).map(function(block) {
    var lines = block.split('\n').map(function(l){ return esc(l); }).join('<br>');
    return '<p>' + lines + '</p>';
  }).join('');
}

function addScript() {
  var title = document.getElementById('newTitle').value.trim();
  var text  = document.getElementById('newText').value.trim();
  var cat   = document.getElementById('newCatCustom').value.trim()
              || document.getElementById('newCat').value
              || 'Geral';
  if (!title || !text) { alert('Preencha o título e o texto do script.'); return; }
  scripts.push({ id: nextId++, cat: cat, title: title, html: textToHTML(text) });
  closeModal();
  activeCat = cat; searchQ = '';
  document.getElementById('pageTitle').textContent = cat;
  buildSidebar(); render();
  toast('Script adicionado');
}

// ── EXPORT JSON ────────────────────────────────────────────────────────────
function exportJSON() {
  var json = JSON.stringify(scripts, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scripts.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('scripts.json exportado — substitua o arquivo no repositório e faça push');
}

// ── TOAST ──────────────────────────────────────────────────────────────────
var toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
